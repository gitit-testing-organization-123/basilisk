name: CTest

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      ctest_label:
        description: "Optional CTest label regex, for example: short"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  ctest-default:
    name: Run CTest suite
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison \
            build-essential \
            ccache \
            cmake \
            ffmpeg \
            flex \
            gawk \
            gfortran \
            gifsicle \
            gnuplot-nox \
            imagemagick \
            libgsl-dev \
            libnetcdf-dev \
            libnetcdff-dev \
            libopenmpi-dev \
            ninja-build \
            openmpi-bin \
            pkg-config \
            python3 \
            python3-dev \
            swig

      - name: Configure default preset
        run: |
          cmake --preset "Test (Release)" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build default preset
        run: cmake --build build/release --parallel

      - name: Run CTest
        env:
          CTEST_LABEL: ${{ inputs.ctest_label }}
        run: |
          set -euo pipefail
          if command -v nproc >/dev/null 2>&1; then
            jobs="$(nproc)"
          else
            jobs="$(sysctl -n hw.logicalcpu)"
          fi
          ctest_report="${PWD}/build/release/ctest-junit.xml"
          rm -f "${ctest_report}"
          ctest_args=(--test-dir build/release --output-on-failure --parallel "${jobs}")
          ctest_args+=(--output-junit "${ctest_report}")
          ctest_args+=(-E '^facefraction3D$')
          if [[ -n "${CTEST_LABEL}" ]]; then
            ctest_args+=(-L "${CTEST_LABEL}")
          fi
          set +e
          ctest "${ctest_args[@]}"
          ctest_status="$?"
          set -e
      - name: Publish CTest report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: CTest
          path: build/release/ctest-junit.xml
          reporter: java-junit

      - name: Upload CTest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basilisk-ctest-junit
          path: build/release/ctest-junit.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload artifact tree
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basilisk-build-artifacts
          path: build/release/src
          if-no-files-found: error
          retention-days: 7

      - name: Dispatch wiki artifact refresh
        if: >-
          ${{
            always() &&
            github.repository == 'gitit-testing-organization-123/basilisk'
          }}
        env:
          GH_TOKEN: ${{ secrets.WIKI_REPO_DISPATCH_TOKEN }}
          TARGET_REPO: gitit-testing-organization-123/wiki
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::error::WIKI_REPO_DISPATCH_TOKEN is required to dispatch the wiki artifact refresh."
            exit 1
          fi
          gh api "repos/${TARGET_REPO}/dispatches" \
            --method POST \
            --field event_type=basilisk-artifacts-ready \
            --field client_payload[source_repo]="${{ github.repository }}" \
            --field client_payload[run_id]="${{ github.run_id }}" \
            --field client_payload[sha]="${{ github.sha }}" \
            --field client_payload[artifact_name]="basilisk-build-artifacts"
