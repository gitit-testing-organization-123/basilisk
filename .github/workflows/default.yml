name: Default CMake

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      task:
        description: "What to run"
        required: true
        default: "build"
        type: choice
        options:
          - build
          - ctest
          - both
      ctest_label:
        description: "Optional CTest label regex, for example: short"
        required: false
        default: ""
        type: string

jobs:
  build-default:
    name: Build default options
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name != 'workflow_dispatch' ||
        github.event.inputs.task == 'build' ||
        github.event.inputs.task == 'both'
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison \
            build-essential \
            cmake \
            ffmpeg \
            flex \
            gawk \
            gfortran \
            gifsicle \
            gnuplot-nox \
            imagemagick \
            libopenmpi-dev \
            ninja-build \
            openmpi-bin \
            pkg-config \
            python3 \
            python3-dev \
            swig

      - name: Configure default preset
        run: cmake --preset Default

      - name: Build default preset
        run: cmake --build --preset Default

  ctest-default:
    name: Run CTest suite
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.task == 'ctest' || github.event.inputs.task == 'both')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison \
            build-essential \
            cmake \
            ffmpeg \
            flex \
            gawk \
            gfortran \
            gifsicle \
            gnuplot-nox \
            imagemagick \
            libopenmpi-dev \
            ninja-build \
            openmpi-bin \
            pkg-config \
            python3 \
            python3-dev \
            swig

      - name: Configure default preset
        run: cmake --preset Default

      - name: Build default preset
        run: cmake --build --preset Default

      - name: Run CTest
        env:
          CTEST_LABEL: ${{ github.event.inputs.ctest_label }}
        run: |
          set -euo pipefail
          ctest_args=(--test-dir build/release --output-on-failure --parallel "$(nproc)")
          if [[ -n "${CTEST_LABEL}" ]]; then
            ctest_args+=(-L "${CTEST_LABEL}")
          fi
          ctest "${ctest_args[@]}"
